<!DOCTYPE html>
<html>
<head>
  <title>PartyKart Catering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #ff6600;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .hero {
      padding: 20px;
      text-align: center;
      background: white;
    }

    .filters {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: white;
    }

    .filters button {
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      background: #ddd;
    }

    .active {
      background: #ff6600 !important;
      color: white;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: white;
      margin: 10px 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .add-btn {
      background: #ff6600;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      float: right;
    }

    .form {
      background: white;
      padding: 10px;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .order-btn {
      width: 100%;
      padding: 12px;
      background: #25D366;
      border: none;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🎉 PartyKart Catering</header>

<div class="hero">
  <h2>Small Party? Big Taste!</h2>
  <p>Premium catering for every occasion</p>
</div>

<div class="filters">
  <button class="active" onclick="filter('all')">All</button>
  <button onclick="filter('veg')">Veg</button>
  <button onclick="filter('nonveg')">Non-Veg</button>
  <button onclick="filter('combo')">Combos</button>
</div>

<div class="container" id="menu"></div>

<div class="form">
  <h3>Customer Details</h3>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">
  <input type="datetime-local" id="time">

  <h3>Total: ₹<span id="total">0</span></h3>

  <button class="order-btn" onclick="order()">Order on WhatsApp</button>
</div>

<script>
let cart = [];
let total = 0;
let currentFilter = "all";

const items = [
  {name:"Chicken 65", price:250, cat:"nonveg", img:"https://source.unsplash.com/400x300/?chicken"},
  {name:"Paneer Tikka", price:200, cat:"veg", img:"https://source.unsplash.com/400x300/?paneer"},
  {name:"Veg Manchurian", price:180, cat:"veg", img:"https://source.unsplash.com/400x300/?veg-food"},
  {name:"Party Combo", price:999, cat:"combo", img:"https://source.unsplash.com/400x300/?party-food"}
];

function render(){
  let html = "";
  items.forEach(item=>{
    if(currentFilter==="all" || item.cat===currentFilter){
      html += `
        <div class="card">
          <img src="${item.img}">
          <div class="card-content">
            <b>${item.name}</b><br>
            <span class="price">₹${item.price}</span>
            <button class="add-btn" onclick="addItem('${item.name}',${item.price})">Add</button>
          </div>
        </div>
      `;
    }
  });
  document.getElementById("menu").innerHTML = html;
}

function filter(cat){
  currentFilter = cat;
  document.querySelectorAll(".filters button").forEach(btn=>btn.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function addItem(name, price){
  cart.push(name + " ₹" + price);
  total += price;
  document.getElementById("total").innerText = total;
}

function order(){
  let msg = "Hi PartyKart, Order:%0A%0A";
  cart.forEach(i=>msg += "- " + i + "%0A");

  msg += "%0ATotal: ₹" + total;
  msg += "%0AName: " + document.getElementById("name").value;
  msg += "%0APhone: " + document.getElementById("phone").value;
  msg += "%0AAddress: " + document.getElementById("address").value;
  msg += "%0ATime: " + document.getElementById("time").value;

  window.open("https://wa.me/917899635909?text=" + msg);
}

render();
</script>

</body>
</html>
